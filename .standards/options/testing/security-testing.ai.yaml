# Security Testing Option
# Reference: OWASP Testing Guide, ISTQB Security Testing

option:
  id: security-testing
  name: Security Testing
  description: Guidelines for security-focused testing
  best_for: Applications handling sensitive data, security-critical systems

  categories:
    - name: Static Application Security Testing (SAST)
      description: Analyze source code for vulnerabilities
      tools: [semgrep, CodeQL, Bandit]
    - name: Dynamic Application Security Testing (DAST)
      description: Test running application for vulnerabilities
      tools: [OWASP ZAP, Burp Suite]
    - name: Dependency Scanning
      description: Check dependencies for known vulnerabilities
      tools: [npm audit, pip-audit, Snyk]
    - name: Secret Detection
      description: Detect hardcoded secrets in code
      tools: [gitleaks, trufflehog]

  owasp_top_10_checks:
    - Injection (SQL, Command, XSS)
    - Broken Authentication
    - Sensitive Data Exposure
    - Security Misconfiguration
    - Using Components with Known Vulnerabilities

  devap_mapping:
    note: "Security tests can be added as completion_criteria in TestPolicy"
    example:
      name: security_scan
      command: "npx semgrep --config auto ."
      required: true
