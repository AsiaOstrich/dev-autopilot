# Performance Testing Option
# Reference: ISTQB Performance Testing

option:
  id: performance-testing
  name: Performance Testing
  description: Guidelines for performance and load testing
  best_for: High-traffic applications, real-time systems, APIs

  types:
    - name: Load Testing
      description: Verify system behavior under expected load
      tools: [k6, Artillery, JMeter]
    - name: Stress Testing
      description: Find breaking point under extreme load
    - name: Endurance Testing
      description: Verify stability over extended periods
    - name: Spike Testing
      description: Verify behavior under sudden load changes

  metrics:
    - Response time (p50, p95, p99)
    - Throughput (requests/second)
    - Error rate
    - Resource utilization (CPU, memory)

  devap_mapping:
    note: "Performance tests can be added as completion_criteria or as a system test level"
    example:
      name: performance_baseline
      command: "k6 run tests/performance/baseline.js"
      required: false
