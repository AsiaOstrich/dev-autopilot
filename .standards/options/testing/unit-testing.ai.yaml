# Unit Testing Option
# Reference: ISTQB Component Testing, FIRST Principles

option:
  id: unit-testing
  name: Unit Testing
  description: Guidelines for writing effective unit tests
  pyramid_level: Unit Tests (UT)
  pyramid_ratio: 70

  principles:
    - id: FIRST
      items:
        - Fast - Tests run in <100ms
        - Independent - No test depends on another
        - Repeatable - Same result every time
        - Self-validating - Pass/fail without manual inspection
        - Timely - Written before or with production code

  patterns:
    structure: Arrange-Act-Assert (AAA)
    naming: "should_{expected_behavior}_when_{condition}"
    isolation: One logical assertion per test

  test_doubles:
    reference: Martin Fowler
    types:
      - name: Stub
        use_when: Providing canned answers to calls
      - name: Mock
        use_when: Verifying interactions between objects
      - name: Fake
        use_when: Lightweight working implementation (e.g., in-memory DB)
      - name: Spy
        use_when: Recording calls for later verification

  devap_mapping:
    test_level_name: unit
    example_command: "pnpm vitest run --reporter=verbose"
