# System Testing Option
# Reference: ISTQB System Testing, ISO 12207 Verification Process

option:
  id: system-testing
  name: System Testing
  description: Guidelines for complete subsystem validation with stubbed external dependencies
  pyramid_level: System Tests (ST)
  pyramid_ratio: 7

  scope:
    - Complete subsystem behavior validation
    - Cross-component workflow testing
    - Configuration and deployment verification
    - Non-functional requirements (performance baselines, security checks)

  characteristics:
    - Tests the complete subsystem as a black box
    - External dependencies are stubbed (APIs, third-party services)
    - Internal services interact with real implementations
    - Medium execution speed (<10s per test)

  environment:
    name: SIT (System Integration Testing)
    reference: "ISO 12207 Verification + Integration Process"
    setup:
      - Real internal services running
      - External APIs stubbed with contract-based mocks
      - Database with representative test data
      - Configuration matching production structure

  techniques:
    - Functional system testing against requirements
    - Smoke testing for critical paths
    - Configuration testing for different environments
    - Error handling and recovery testing

  devap_mapping:
    test_level_name: system
    example_command: "pnpm vitest run src/**/*.system.test.ts"
    note: "New in devap SPEC-003. Maps to TestLevelName 'system'."
