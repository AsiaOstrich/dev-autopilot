# ISTQB Testing Framework Option
# Reference: ISTQB Foundation Syllabus

option:
  id: istqb-framework
  name: ISTQB Testing Framework
  description: Formal testing framework based on ISTQB Foundation Syllabus
  best_for: Enterprise projects, certification needs, formal QA processes

  levels:
    - name: Component Testing (Unit)
      istqb_term: Component Testing
      scope: Individual software components in isolation
      techniques:
        - Equivalence Partitioning
        - Boundary Value Analysis
        - Statement/Branch Coverage

    - name: Integration Testing
      istqb_term: Integration Testing
      scope: Interactions between integrated components
      techniques:
        - Big-bang Integration
        - Incremental (Top-down / Bottom-up)
        - API Contract Testing

    - name: System Testing
      istqb_term: System Testing
      scope: Complete system behavior against requirements
      techniques:
        - Functional Testing
        - Non-functional Testing (Performance, Security)
        - Use Case Testing

    - name: Acceptance Testing
      istqb_term: Acceptance Testing
      scope: System readiness for deployment
      subtypes:
        - User Acceptance Testing (UAT)
        - Operational Acceptance Testing (OAT)
        - Contractual Acceptance Testing
        - Alpha/Beta Testing

  test_types:
    - Functional Testing
    - Non-functional Testing
    - Structural Testing (White-box)
    - Change-related Testing (Regression, Re-testing)

  note: >
    ISTQB does not prescribe fixed ratios between test levels.
    The 70/20/7/3 ratio is a separate industry recommendation (Mike Cohn).
